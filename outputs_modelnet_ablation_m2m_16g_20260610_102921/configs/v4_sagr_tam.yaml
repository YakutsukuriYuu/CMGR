seed: 42
train_dataset: modelnet
test_dataset: modelnet
num_base_classes: 20
incremental_task_splits:
- 5
- 5
- 5
- 5
ablation_variant: v4_sagr_tam
use_sagr: true
use_tam: true
use_bnd: false
use_saved_base_accuracy: false
batch_size: 8
grad_accum_steps: 2
num_workers: 8
point_cloud_size: 2048
depth_resolution: 224
num_views: 10
base_epochs: 100
base_lr: 0.0005
base_weight_decay: 0.0001
augmentation: true
inc_epochs: 50
inc_lr: 0.001
inc_lr_min: 0.0001
inc_weight_decay: 0.0001
early_stopping: true
early_stop_min_delta: 0.001
base_early_stop_warmup: 20
base_early_stop_patience: 15
inc_early_stop_warmup: 8
inc_early_stop_patience: 8
bnd_epochs: 10
bnd_lr: 0.001
bnd_threshold: 0.1
sagr_layers:
- 0
- 4
- 8
mask_ratio: 0.9
num_sa_layers: 2
alpha: 1.0
beta: 0.1
gamma: 2.0
use_clip_logits_during_training: true
clip_logit_weight: 1.0
exemplars_per_class: 1
text_template: a photo of a {}
recon_feat_dim: 384
recon_num_layers: 12
depth_feat_dim: 512
depth_num_layers: 12
clip_feat_dim: 512
recon_ckpt_path: ../deps/ReCon/pretrained/recon.pth
depth_ckpt_path: ../deps/CLIP2Point/pretrained/vit32/best_eval.pth
